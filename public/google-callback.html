<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Sign-In</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .box {
        max-width: 420px;
        padding: 24px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.95);
        box-shadow: 0 16px 48px rgba(15, 23, 42, 0.35);
      }
      .spinner {
        margin: 24px auto;
        width: 42px;
        height: 42px;
        border: 4px solid rgba(248, 250, 252, 0.15);
        border-top-color: #38bdf8;
        border-radius: 9999px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      a { color: #38bdf8; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Signing in with Google...</h1>
      <div class="spinner"></div>
      <p>If this page does not close automatically, return to the TuneX login page.</p>
    </div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        const message = { type: 'GOOGLE_AUTH_CODE' };
        if (error) {
          message.error = errorDescription || error || 'Google authentication failed';
        } else if (code) {
          message.code = code;
        } else {
          message.error = 'No authorization code was returned from Google.';
        }

        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(message, '*');
        }

        setTimeout(() => {
          if (window.opener && !window.opener.closed) {
            window.close();
          }
        }, 700);
      })();
    </script>
  </body>
</html>
